<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12345助理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center}
.login-box h2{font-size:22px;margin-bottom:8px;color:#1a1a2e}
.login-box p{color:#888;font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;transition:border .2s;text-align:center;letter-spacing:4px}
.login-box input:focus{border-color:#667eea}
.login-box button{width:100%;margin-top:16px;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:0.9}
.login-box .err{color:#e74c3c;font-size:13px;margin-top:10px;display:none}
.chat-wrap{display:none;flex-direction:column;height:100vh}
.chat-wrap.show{display:flex}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 20px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px}
.header .badge{font-size:12px;opacity:0.8}
.session-bar{margin-top:8px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border-radius:8px;padding:6px 10px}
.session-bar .label{font-size:11px;white-space:nowrap;opacity:0.8}
.session-bar .sid{flex:1;font-size:11px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,0.15);padding:3px 8px;border-radius:4px;cursor:pointer;user-select:all}
.session-bar .btn-sm{font-size:11px;background:rgba(255,255,255,0.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:background .2s}
.session-bar .btn-sm:hover{background:rgba(255,255,255,0.4)}
.session-bar input{font-size:11px;flex:1;padding:3px 8px;border-radius:4px;border:none;outline:none;font-family:monospace;background:rgba(0,0,0,0.15);color:#fff;min-width:120px}
.session-bar input::placeholder{color:rgba(255,255,255,0.5)}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;padding:12px 16px;border-radius:14px;font-size:15px;line-height:1.6;word-break:break-word}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.msg .time{font-size:11px;opacity:0.5;margin-top:6px}
.input-area{display:flex;padding:14px 20px;background:#fff;border-top:1px solid #eee;gap:10px;flex-shrink:0}
.input-area textarea{flex:1;padding:12px;border:2px solid #e8e8e8;border-radius:10px;resize:none;font-size:15px;outline:none;font-family:inherit;max-height:120px;min-height:44px;line-height:1.4}
.input-area textarea:focus{border-color:#667eea}
.input-area button{padding:0 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.input-area button:hover{opacity:0.9}
.input-area button:disabled{opacity:0.5;cursor:not-allowed}
.typing{align-self:flex-start;background:#fff;padding:12px 16px;border-radius:14px;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.typing span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#aaa;margin:0 3px;animation:bounce 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.footer{text-align:center;padding:6px;font-size:11px;color:#bbb;background:#fff;flex-shrink:0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
<div class="login-box">
<h2>12345助理</h2>
<p>请输入密码访问</p>
<input type="password" id="pwdInput" placeholder="输入密码" autofocus>
<button onclick="doLogin()">进入</button>
<div class="err" id="loginErr">密码错误</div>
</div>
</div>

<div class="toast" id="toast"></div>

<div class="chat-wrap" id="chatWrap">
<div class="header">
<div class="header-top">
<h1>12345助理</h1>
<span class="badge">知识库 · 跨设备同步</span>
</div>
<div class="session-bar" id="sessionBar">
<span class="label">会话ID</span>
<span class="sid" id="sidDisplay" title="点击复制" onclick="copySid()">未开始</span>
<button class="btn-sm" onclick="copySid()">复制</button>
<input type="text" id="sidInput" placeholder="粘贴其他设备会话ID">
<button class="btn-sm" onclick="switchSid()">切换</button>
</div>
</div>
<div class="messages" id="messages"></div>
<div class="typing" id="typing" style="display:none"><span></span><span></span><span></span></div>
<div class="input-area">
<textarea id="userInput" placeholder="输入你的问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
<button onclick="sendMsg()" id="sendBtn">发送</button>
</div>
<div class="footer">Powered by Dify · 会话自动保持</div>
</div>

<script>
const API_KEY='app-Ssvah5Yx586caaMIrDD5sKS4';
const API_URL='https://udify.app/v1/chat-messages';
const CORRECT_PWD='12345';
let conversationId=localStorage.getItem('dify_conv_id')||'';
let userId=localStorage.getItem('dify_user_id')||('user-'+Date.now()+'-'+Math.random().toString(36).substr(2,6));
localStorage.setItem('dify_user_id',userId);

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function copySid(){if(!conversationId){showToast('暂无会话ID，先发一条消息吧');return}navigator.clipboard.writeText(conversationId);showToast('会话ID已复制')}
function updateSidDisplay(){var d=document.getElementById('sidDisplay');d.textContent=conversationId||'未开始';d.title=conversationId||''}
updateSidDisplay();

function switchSid(){
var v=document.getElementById('sidInput').value.trim();
if(!v){showToast('请先粘贴会话ID');return}
conversationId=v;
localStorage.setItem('dify_conv_id',conversationId);
updateSidDisplay();
document.getElementById('messages').innerHTML='';
addMsg('bot','已切换到该会话，历史消息不会加载，但新消息会接续之前的上下文。');
document.getElementById('sidInput').value='';
}

function doLogin(){
var i=document.getElementById('pwdInput').value;
if(i===CORRECT_PWD){
document.getElementById('loginOverlay').style.display='none';
document.getElementById('chatWrap').classList.add('show');
updateSidDisplay();
if(conversationId)addMsg('bot','欢迎回来，继续上次的对话吧~');
else addMsg('bot','你好，我是12345助理，有什么可以帮你的？');
}else{
document.getElementById('loginErr').style.display='block';
document.getElementById('pwdInput').value='';
}
}
document.getElementById('pwdInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});

function addMsg(role,text){
var d=document.createElement('div');
d.className='msg '+role;
var n=new Date();
var t=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
d.innerHTML=text.replace(/\n/g,'<br>')+'<div class="time">'+t+'</div>';
document.getElementById('messages').appendChild(d);
document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
}

async function sendMsg(){
var i=document.getElementById('userInput');
var t=i.value.trim();
if(!t)return;
addMsg('user',t);
i.value='';
document.getElementById('sendBtn').disabled=true;
document.getElementById('typing').style.display='block';
try{
var b={inputs:{},query:t,response_mode:'blocking',user:userId};
if(conversationId)b.conversation_id=conversationId;
var r=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json'},body:JSON.stringify(b)});
var d=await r.json();
document.getElementById('typing').style.display='none';
if(d.conversation_id){conversationId=d.conversation_id;localStorage.setItem('dify_conv_id',conversationId);updateSidDisplay()}
addMsg('bot',d.answer||'抱歉，没有收到回复');
}catch(e){
document.getElementById('typing').style.display='none';
addMsg('bot','网络错误，请稍后重试');
}
document.getElementById('sendBtn').disabled=false;
document.getElementById('userInput').focus();
}
</script>
</body>
</html>
